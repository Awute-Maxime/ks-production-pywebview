<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — KS Production</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --accent: #e94560; --dark: #1a1a2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; width: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Halos décoratifs */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 50%, rgba(233,69,96,.18) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, rgba(108,92,231,.18) 0%, transparent 55%);
            pointer-events: none;
        }

        .login-box {
            width: 380px;
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            gap: 0;
        }

        /* ── LOGO ── */
        .logo-wrap {
            width: 84px; height: 84px; border-radius: 22px;
            background: linear-gradient(135deg, var(--accent), #6c5ce7);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.4rem;
            box-shadow: 0 10px 36px rgba(233,69,96,.45);
            margin-bottom: 14px;
            overflow: hidden;
        }
        .logo-wrap img { width: 100%; height: 100%; object-fit: contain; border-radius: 20px; }

        .app-name {
            font-size: 1.75rem; font-weight: 900; color: #fff;
            letter-spacing: -.03em; text-align: center; line-height: 1;
        }
        .app-name span { color: var(--accent); }
        .app-sub {
            font-size: .75rem; color: rgba(255,255,255,.4);
            text-align: center; margin-top: 5px; margin-bottom: 28px;
        }

        /* ── CARTE ── */
        .card {
            width: 100%;
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 30px 28px 24px;
            box-shadow: 0 24px 64px rgba(0,0,0,.35);
        }

        .card-title {
            font-size: .95rem; font-weight: 700; color: #fff;
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: .74rem; color: rgba(255,255,255,.38);
            margin-bottom: 22px;
        }

        /* ── CHAMPS ── */
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: .74rem; font-weight: 600;
            color: rgba(255,255,255,.6); margin-bottom: 6px;
        }
        .input-wrap {
            display: flex; align-items: center;
            background: rgba(255,255,255,.07);
            border: 1.5px solid rgba(255,255,255,.12);
            border-radius: 10px; overflow: hidden;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(233,69,96,.2);
        }
        .input-wrap .ico {
            padding: 0 13px; color: rgba(255,255,255,.35); font-size: .9rem;
            flex-shrink: 0;
        }
        .input-wrap input {
            flex: 1; background: transparent; border: none; outline: none;
            color: #fff; font-size: .88rem; padding: 11px 0;
            font-family: inherit;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,.2); }
        .input-wrap .toggle-pwd {
            background: transparent; border: none; color: rgba(255,255,255,.35);
            cursor: pointer; padding: 0 13px; font-size: .9rem;
            transition: color .15s;
        }
        .input-wrap .toggle-pwd:hover { color: #fff; }

        /* ── ERREUR ── */
        .alert-err {
            background: rgba(214,48,49,.15);
            border: 1px solid rgba(214,48,49,.35);
            border-radius: 9px; color: #ff8a8a;
            padding: 9px 13px; font-size: .8rem;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 16px;
        }

        /* ── BOUTON ── */
        .btn-login {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, #c0392b 100%);
            border: none; border-radius: 10px; color: #fff;
            font-weight: 700; font-size: .92rem; cursor: pointer;
            margin-top: 6px;
            box-shadow: 0 4px 18px rgba(233,69,96,.38);
            transition: all .2s; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 7px 24px rgba(233,69,96,.52);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login.loading { opacity: .7; pointer-events: none; }

        /* ── PIED ── */
        .footer {
            margin-top: 20px; text-align: center;
            font-size: .68rem; color: rgba(255,255,255,.2);
            line-height: 1.7;
        }
        .footer strong { color: rgba(255,255,255,.35); }

        /* ── INDICATEUR CONNEXION ── */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-box">

    <!-- LOGO -->
    <div class="logo-wrap">
        {% if params and params.logo_filename %}
            <img src="/static/uploads/{{ params.logo_filename }}" alt="Logo KS">
        {% else %}
            🎵
        {% endif %}
    </div>
    <div class="app-name">KS <span>Production</span></div>
    <div class="app-sub">Studio d'Enregistrement &amp; Sonorisation</div>

    <!-- CARTE -->
    <div class="card">
        <div class="card-title">Connexion</div>
        <div class="card-sub">Accédez à votre espace de gestion</div>

        {% if erreur %}
        <div class="alert-err">
            <i class="bi bi-exclamation-circle-fill"></i> {{ erreur }}
        </div>
        {% endif %}

        <form method="POST" action="/login" id="loginForm">
            <div class="field">
                <label>Nom d'utilisateur</label>
                <div class="input-wrap">
                    <span class="ico"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" placeholder="Identifiant"
                           required autofocus autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <div class="input-wrap">
                    <span class="ico"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" name="password" id="inputPwd"
                           placeholder="Mot de passe" required autocomplete="current-password">
                    <button type="button" class="toggle-pwd" onclick="togglePwd()">
                        <i class="bi bi-eye-fill" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <div class="spinner" id="spinner"></div>
                <i class="bi bi-box-arrow-in-right" id="btnIcon"></i>
                <span id="btnText">Se connecter</span>
            </button>
        </form>
    </div>

    <!-- PIED -->
    <div class="footer">
        <strong>KS Production</strong> &nbsp;·&nbsp; v1.0<br>
        © 2026 Développé par AWUTE Maxime
    </div>

</div>

<script>
    // Toggle mot de passe
    function togglePwd() {
        const input = document.getElementById('inputPwd');
        const icon  = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash-fill';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye-fill';
        }
    }

    // Animation de chargement au submit
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn     = document.getElementById('btnLogin');
        const spinner = document.getElementById('spinner');
        const icon    = document.getElementById('btnIcon');
        const text    = document.getElementById('btnText');
        btn.classList.add('loading');
        spinner.style.display = 'block';
        icon.style.display    = 'none';
        text.textContent      = 'Connexion...';
    });

    // Touche Entrée → submit
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('loginForm').submit();
        }
    });
</script>
</body>
</html>
