<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Succès</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh; display: flex;
            align-items: center; justify-content: center;
        }
        .card {
            background: #fff; border-radius: 16px;
            padding: 40px 48px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            max-width: 400px; width: 90%;
        }
        .ico {
            width: 72px; height: 72px; border-radius: 50%;
            background: #d1fae5; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 2rem;
        }
        h2 { font-size: 1.3rem; font-weight: 800; color: #1a1a2e; margin-bottom: 8px; }
        p  { font-size: .88rem; color: #6b7280; margin-bottom: 24px; }
        .progress-bar {
            height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #00b894; border-radius: 2px;
            animation: fill 1.5s linear forwards;
        }
        .hint { font-size: .75rem; color: #9ca3af; margin-top: 12px; }
        @keyframes fill { from { width: 0; } to { width: 100%; } }
    </style>
</head>
<body>
<div class="card">
    <div class="ico">✅</div>
    <h2>Enregistrement réussi !</h2>
    <p>{{ message }}</p>
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    <div class="hint">Fermeture automatique...</div>
</div>
<script>
    var RELOAD_URL = {{ reload_url | tojson }};
    setTimeout(function() {
        // Rafraîchir la fenêtre principale
        if (window.opener) {
            window.opener.location.href = RELOAD_URL;
        }
        // Fermer cette fenêtre
        fetch('/api/close-window').catch(function(){});
        setTimeout(function(){ window.close(); }, 100);
    }, 1500);
</script>
</body>
</html>
